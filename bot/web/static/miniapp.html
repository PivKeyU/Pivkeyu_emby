<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>修仙纪元 · 洞府</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/miniapp.css">
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
</head>
<body>
  <main class="app-shell">
    <section class="hero-panel card">
      <div class="hero-main">
        <p class="eyebrow">仙域中枢</p>
        <h1>洞府</h1>
        <p id="welcome-text" class="hero-copy">正在感应天机引...</p>
        <div class="hero-pills">
          <span id="account-level-badge" class="badge badge--pending">天地未开</span>
          <span id="plugin-count-pill" class="hero-pill">0 处阵法</span>
          <span id="role-pill" class="hero-pill">凡夫俗子</span>
        </div>
        <p id="hero-note" class="hero-note">结成道缘后，可自此处撕裂虚空，穿梭于千般秘境。</p>
      </div>

      <div class="hero-side">
        <section class="overview-card">
          <p class="eyebrow">灵根概览</p>
          <div class="overview-grid">
            <article class="profile-item">
              <span>修真道统</span>
              <strong id="brand-name">-</strong>
            </article>
            <article class="profile-item">
              <span>灵石称呼</span>
              <strong id="currency-name">-</strong>
            </article>
            <article class="profile-item">
              <span>道号</span>
              <strong id="hero-name">-</strong>
            </article>
            <article class="profile-item">
              <span>仙籍 ID</span>
              <strong id="hero-id">-</strong>
            </article>
          </div>
        </section>

        <section id="admin-entry-card" class="hero-admin hidden">
          <div class="hero-admin-copy">
            <span class="hero-admin-label">宗门大殿</span>
            <p>大能尊者破空之门，掌控天地法则造化。</p>
          </div>
          <button id="admin-entry-button" type="button" class="ghost">踏入大殿</button>
        </section>
      </div>
    </section>

    <section id="fold-toolbar" class="card fold-toolbar">
      <div class="fold-toolbar-copy">
        <p class="eyebrow">天地轮转</p>
        <p id="fold-count" class="section-copy">当前可缩地成寸 0 处道场</p>
      </div>
      <div class="fold-toolbar-actions">
        <button type="button" class="ghost" data-fold-open-all>诸般万象展</button>
        <button type="button" class="ghost" data-fold-close-all>乾坤一气收</button>
      </div>
    </section>

    <section class="board-grid">
      <details class="card fold-card">
        <summary class="fold-summary">
          <div>
            <p class="eyebrow">仙窍录</p>
            <h2>道统与寿元</h2>
          </div>
          <span class="summary-tip">天灵根、灵石、阳寿与造化配额</span>
        </summary>
        <div class="fold-body">
          <p id="account-level-desc" class="section-copy">冥冥中有天意正在拨动...</p>
          <div class="profile-grid">
            <article class="profile-item">
              <span>仙籍 ID</span>
              <strong id="tg-id">-</strong>
            </article>
            <article class="profile-item">
              <span>真名</span>
              <strong id="tg-name">-</strong>
            </article>
            <article class="profile-item">
              <span>储物袋中</span>
              <strong id="account-iv">-</strong>
            </article>
            <article class="profile-item">
              <span>灵犀刻印</span>
              <strong id="account-name">-</strong>
            </article>
            <article class="profile-item">
              <span>寿元终期</span>
              <strong id="account-ex">-</strong>
            </article>
            <article class="profile-item">
              <span>闭关时日</span>
              <strong id="account-us">-</strong>
            </article>
          </div>
        </div>
      </details>

      <details class="card fold-card span-2">
        <summary class="fold-summary">
          <div>
            <p class="eyebrow">各殿阵枢</p>
            <h2>开启之阵</h2>
          </div>
          <span class="summary-tip">仅展示天机已明之各殿</span>
        </summary>
        <div class="fold-body">
          <div class="section-top">
            <p class="section-copy">此处为各殿传送阵眼，长按即可挪移乾坤，重排诸阵顺序。</p>
            <span id="plugin-count" class="section-pill">天书显字 0 / 0</span>
          </div>
          <div id="plugin-grid" class="plugin-grid"></div>
        </div>
      </details>
    </section>
  </main>

  <nav id="bottom-nav" class="bottom-nav"></nav>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="/static/miniapp.js"></script>
</body>
</html>
