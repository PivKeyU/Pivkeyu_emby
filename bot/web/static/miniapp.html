<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>片刻面板</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/miniapp.css">
</head>
<body>
  <main class="app-shell">
    <section class="hero-panel card">
      <div class="hero-main">
        <p class="eyebrow">控制中枢</p>
        <h1>片刻面板</h1>
        <p id="welcome-text" class="hero-copy">正在连接服务器...</p>
        <div class="hero-pills">
          <span id="account-level-badge" class="badge badge--pending">未验证</span>
          <span id="plugin-count-pill" class="hero-pill">0 个模块</span>
          <span id="role-pill" class="hero-pill">普通用户</span>
        </div>
        <p id="hero-note" class="hero-note">绑定账号后，即可在此管理你的观影服务与各项功能。</p>
      </div>

      <div class="hero-side">
        <section class="overview-card">
          <p class="eyebrow">账户概览</p>
          <div class="overview-grid">
            <article class="profile-item">
              <span>服务名称</span>
              <strong id="brand-name">-</strong>
            </article>
            <article class="profile-item">
              <span>货币名称</span>
              <strong id="currency-name">-</strong>
            </article>
            <article class="profile-item">
              <span>昵称</span>
              <strong id="hero-name">-</strong>
            </article>
            <article class="profile-item">
              <span>TG ID</span>
              <strong id="hero-id">-</strong>
            </article>
          </div>
        </section>

        <section id="admin-entry-card" class="hero-admin hidden">
          <div class="hero-admin-copy">
            <span class="hero-admin-label">管理后台</span>
            <p>进入管理面板，查看用户数据与系统设置。</p>
          </div>
          <button id="admin-entry-button" type="button" class="ghost">进入后台</button>
        </section>
      </div>
    </section>

    <section id="fold-toolbar" class="card fold-toolbar">
      <div class="fold-toolbar-copy">
        <p class="eyebrow">功能模块</p>
        <p id="fold-count" class="section-copy">共 0 个模块</p>
      </div>
      <div class="fold-toolbar-actions">
        <button type="button" class="ghost" data-fold-open-all>全部展开</button>
        <button type="button" class="ghost" data-fold-close-all>全部收起</button>
      </div>
    </section>

    <section class="board-grid">
      <details class="card fold-card">
        <summary class="fold-summary">
          <div>
            <p class="eyebrow">我的账户</p>
            <h2>账号与到期</h2>
          </div>
          <span class="summary-tip">等级、余额、到期时间与配额</span>
        </summary>
        <div class="fold-body">
          <p id="account-level-desc" class="section-copy">正在获取账户信息...</p>
          <div class="profile-grid">
            <article class="profile-item">
              <span>TG ID</span>
              <strong id="tg-id">-</strong>
            </article>
            <article class="profile-item">
              <span>昵称</span>
              <strong id="tg-name">-</strong>
            </article>
            <article class="profile-item">
              <span>余额</span>
              <strong id="account-iv">-</strong>
            </article>
            <article class="profile-item">
              <span>Emby 用户名</span>
              <strong id="account-name">-</strong>
            </article>
            <article class="profile-item">
              <span>到期时间</span>
              <strong id="account-ex">-</strong>
            </article>
            <article class="profile-item">
              <span>使用天数</span>
              <strong id="account-us">-</strong>
            </article>
          </div>
        </div>
      </details>

      <details class="card fold-card span-2">
        <summary class="fold-summary">
          <div>
            <p class="eyebrow">已启用模块</p>
            <h2>功能入口</h2>
          </div>
          <span class="summary-tip">展示所有已启用的功能模块</span>
        </summary>
        <div class="fold-body">
          <div class="section-top">
            <p class="section-copy">点击卡片即可进入对应功能，长按可拖动排序。</p>
            <span id="plugin-count" class="section-pill">已加载 0 / 0</span>
          </div>
          <div id="plugin-grid" class="plugin-grid"></div>
        </div>
      </details>
    </section>
  </main>

  <nav id="bottom-nav" class="bottom-nav"></nav>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script defer src="/static/miniapp.js"></script>
</body>
</html>
