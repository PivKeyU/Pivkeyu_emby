name: pivkeyu_emby

services:
  mysql:
    image: ${PIVKEYU_MYSQL_IMAGE:-mysql:5.7}
    platform: linux/amd64
    container_name: mysql
    command: mysqld --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    restart: always
    network_mode: host
    ulimits:
      nofile:
        soft: 131072
        hard: 131072
    environment:
      MYSQL_ROOT_PASSWORD: pivkeyu
      MYSQL_USER: pivkeyu
      MYSQL_DATABASE: pivkeyu
      MYSQL_PASSWORD: pivkeyu
      MYSQL_ROOT_HOST: "%"
    volumes:
      - ./db:/var/lib/mysql
      - ./mysql/conf.d/zz-pivkeyu-tuning.cnf:/etc/mysql/conf.d/zz-pivkeyu-tuning.cnf:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

  redis:
    image: ${PIVKEYU_REDIS_IMAGE:-redis:7-alpine}
    container_name: redis
    command: redis-server --bind 127.0.0.1 --protected-mode yes --appendonly no --save "" --maxmemory 256mb --maxmemory-policy allkeys-lru
    restart: always
    network_mode: host
    healthcheck:
      test: ["CMD", "redis-cli", "-h", "127.0.0.1", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  pivkeyu_emby:
    build:
      context: .
    image: ${PIVKEYU_APP_IMAGE:-pivkeyu/pivkeyu_emby:latest}
    container_name: pivkeyu_emby
    restart: always
    network_mode: host
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PIVKEYU_NOFILE_SOFT: 131072
      PIVKEYU_DB_STARTUP_MAX_RETRIES: 20
      PIVKEYU_DB_STARTUP_RETRY_DELAY: 3
      PIVKEYU_DB_CONNECT_TIMEOUT: 5
      PIVKEYU_DB_POOL_SIZE: 64
      PIVKEYU_DB_MAX_OVERFLOW: 64
      PIVKEYU_DB_POOL_TIMEOUT: 60
      PIVKEYU_DB_POOL_RECYCLE: 1800
      PIVKEYU_DB_POOL_PRE_PING: "true"
      PIVKEYU_DB_POOL_USE_LIFO: "true"
      PIVKEYU_DB_POOL_RESET_ON_RETURN: rollback
      PIVKEYU_PYROGRAM_WORKERS: 256
      PIVKEYU_PYROGRAM_MAX_CONCURRENT_TRANSMISSIONS: 1024
      PIVKEYU_EMBY_HTTP_LIMIT: 192
      PIVKEYU_EMBY_HTTP_LIMIT_PER_HOST: 64
      PIVKEYU_EMBY_HTTP_KEEPALIVE_TIMEOUT: 90
      PIVKEYU_EMBY_HTTP_DNS_CACHE_TTL: 600
      PIVKEYU_REDIS_ENABLED: "true"
      PIVKEYU_REDIS_HOST: 127.0.0.1
      PIVKEYU_REDIS_PORT: 6379
      PIVKEYU_REDIS_DB: 0
      PIVKEYU_REDIS_PREFIX: pivkeyu_emby
      PIVKEYU_REDIS_EMBY_TTL: 300
      PIVKEYU_REDIS_EMBY_MISS_TTL: 60
    ulimits:
      nofile:
        soft: 131072
        hard: 131072
    volumes:
      - ./data:/app/data
      - ./log:/app/log
      - /var/run/docker.sock:/var/run/docker.sock

  pivkeyu-caddy:
    image: ${PIVKEYU_CADDY_IMAGE:-caddy:2-alpine}
    container_name: pivkeyu-caddy
    restart: always
    network_mode: host
    depends_on:
      - pivkeyu_emby
    environment:
      PIVKEYU_PUBLIC_DOMAIN: ${PIVKEYU_PUBLIC_DOMAIN:-localhost}
      PIVKEYU_UPSTREAM: ${PIVKEYU_UPSTREAM:-127.0.0.1:8838}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy/data:/data
      - ./caddy/config:/config
