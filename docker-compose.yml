name: pivkeyu_emby

services:
  postgres:
    image: ${PIVKEYU_POSTGRES_IMAGE:-postgres:16-alpine}
    container_name: postgres
    restart: always
    network_mode: host
    ulimits:
      nofile:
        soft: 131072
        hard: 131072
    environment:
      POSTGRES_USER: pivkeyu
      POSTGRES_DB: pivkeyu
      POSTGRES_PASSWORD: pivkeyu
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - ./db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

  redis:
    image: ${PIVKEYU_REDIS_IMAGE:-redis:7-alpine}
    container_name: redis
    command: redis-server --bind 127.0.0.1 --protected-mode yes --appendonly no --save "" --maxmemory 256mb --maxmemory-policy allkeys-lru
    restart: always
    network_mode: host
    healthcheck:
      test: ["CMD", "redis-cli", "-h", "127.0.0.1", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  pivkeyu_emby:
    build:
      context: .
    image: ${PIVKEYU_APP_IMAGE:-pivkeyu/pivkeyu_emby:latest}
    container_name: pivkeyu_emby
    restart: always
    network_mode: host
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PIVKEYU_BOT_TOKEN: ${PIVKEYU_BOT_TOKEN:-}
      PIVKEYU_OWNER_API: ${PIVKEYU_OWNER_API:-}
      PIVKEYU_OWNER_HASH: ${PIVKEYU_OWNER_HASH:-}
      BOT_TOKEN: ${BOT_TOKEN:-}
      OWNER_API: ${OWNER_API:-}
      OWNER_HASH: ${OWNER_HASH:-}
      API_ID: ${API_ID:-}
      API_HASH: ${API_HASH:-}
      PIVKEYU_NOFILE_SOFT: 131072
      PIVKEYU_DB_STARTUP_MAX_RETRIES: 20
      PIVKEYU_DB_STARTUP_RETRY_DELAY: 3
      PIVKEYU_DB_CONNECT_TIMEOUT: 5
      PIVKEYU_DB_POOL_SIZE: 64
      PIVKEYU_DB_MAX_OVERFLOW: 64
      PIVKEYU_DB_POOL_TIMEOUT: 60
      PIVKEYU_DB_POOL_RECYCLE: 1800
      PIVKEYU_DB_POOL_PRE_PING: "true"
      PIVKEYU_DB_POOL_USE_LIFO: "true"
      PIVKEYU_DB_POOL_RESET_ON_RETURN: rollback
      PIVKEYU_PYROGRAM_WORKERS: ${PIVKEYU_PYROGRAM_WORKERS:-16}
      PIVKEYU_PYROGRAM_MAX_CONCURRENT_TRANSMISSIONS: ${PIVKEYU_PYROGRAM_MAX_CONCURRENT_TRANSMISSIONS:-48}
      PIVKEYU_EMBY_HTTP_LIMIT: 192
      PIVKEYU_EMBY_HTTP_LIMIT_PER_HOST: 64
      PIVKEYU_EMBY_HTTP_KEEPALIVE_TIMEOUT: 90
      PIVKEYU_EMBY_HTTP_DNS_CACHE_TTL: 600
      PIVKEYU_REDIS_ENABLED: "true"
      PIVKEYU_REDIS_HOST: 127.0.0.1
      PIVKEYU_REDIS_PORT: 6379
      PIVKEYU_REDIS_DB: 0
      PIVKEYU_REDIS_PREFIX: pivkeyu_emby
      PIVKEYU_REDIS_EMBY_TTL: 300
      PIVKEYU_REDIS_EMBY_MISS_TTL: 60
      PIVKEYU_REDIS_XIUXIAN_SETTINGS_TTL: 300
      PIVKEYU_REDIS_XIUXIAN_CATALOG_TTL: 300
      PIVKEYU_REDIS_XIUXIAN_USER_VIEW_TTL: 30
      PIVKEYU_REGISTER_QUEUE_WORKERS: 2
      PIVKEYU_REGISTER_QUEUE_MAXSIZE: 64
    ulimits:
      nofile:
        soft: 131072
        hard: 131072
    volumes:
      - ./data:/app/data
      - ./log:/app/log
      - /var/run/docker.sock:/var/run/docker.sock

  pivkeyu-caddy:
    image: ${PIVKEYU_CADDY_IMAGE:-caddy:2-alpine}
    container_name: pivkeyu-caddy
    restart: always
    network_mode: host
    depends_on:
      - pivkeyu_emby
    environment:
      PIVKEYU_PUBLIC_DOMAIN: ${PIVKEYU_PUBLIC_DOMAIN:-localhost}
      PIVKEYU_UPSTREAM: ${PIVKEYU_UPSTREAM:-127.0.0.1:8838}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy/data:/data
      - ./caddy/config:/config
