name: pivkeyuebmy

services:
  mysql:
    image: mysql:5.7
    container_name: mysql
    command: mysqld --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    restart: always
    network_mode: host
    environment:
      MYSQL_ROOT_PASSWORD: pivkeyu
      MYSQL_USER: pivkeyu
      MYSQL_DATABASE: pivkeyu
      MYSQL_PASSWORD: pivkeyu
      MYSQL_ROOT_HOST: "%"
    volumes:
      - ./db:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

  pivkeyuebmy:
    build:
      context: .
      dockerfile: Dockerfile
    image: pivkeyuebmy:local
    pull_policy: never
    container_name: pivkeyuebmy
    restart: always
    network_mode: host
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PIVKEYU_DB_STARTUP_MAX_RETRIES: 20
      PIVKEYU_DB_STARTUP_RETRY_DELAY: 3
      PIVKEYU_DB_CONNECT_TIMEOUT: 5
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    volumes:
      - ./data:/app/data
      - ./log:/app/log

  pivkeyu-caddy:
    image: caddy:2-alpine
    container_name: pivkeyu-caddy
    restart: always
    network_mode: host
    depends_on:
      - pivkeyuebmy
    environment:
      PIVKEYU_PUBLIC_DOMAIN: ${PIVKEYU_PUBLIC_DOMAIN:-localhost}
      PIVKEYU_UPSTREAM: ${PIVKEYU_UPSTREAM:-127.0.0.1:8838}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy/data:/data
      - ./caddy/config:/config
