name: Publish Latest Docker image

on:
  workflow_dispatch:
  push:
    branches: ['main', 'master']

jobs:
  push_to_registries:
    name: 推送最新镜像到 Docker Hub
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # 拉取仓库代码，作为后续镜像构建上下文。
      -
        name: 检出代码
        uses: actions/checkout@v4
      # 启用 QEMU，方便在单个 CI 主机上模拟多架构构建环境。
      -
        name: 配置 QEMU
        uses: docker/setup-qemu-action@v3
      # 启用 Buildx，构建 linux/amd64 和 linux/arm64 双架构镜像。
      -
        name: 配置 Buildx
        uses: docker/setup-buildx-action@v3
      # 登录 Docker Hub，后续推送镜像时需要这个凭据。
      -
        name: 登录 Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 直接构建并推送双架构镜像到 Docker Hub。
      - name: 构建并推送双架构镜像
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/pivkeyu_emby:latest
