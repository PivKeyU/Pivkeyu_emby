name: Publish Release Docker image

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  push_to_registries:
    name: 推送发布版镜像到 Docker Hub
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # 拉取仓库代码，作为发布镜像的构建上下文。
      -
        name: 检出代码
        uses: actions/checkout@v4
      # 启用 QEMU，保证多架构构建流程可在 GitHub Actions 上直接运行。
      -
        name: 配置 QEMU
        uses: docker/setup-qemu-action@v3
      # 启用 Buildx，输出同时兼容 amd64 和 arm64 的镜像。
      -
        name: 配置 Buildx
        uses: docker/setup-buildx-action@v3
      # 登录 Docker Hub，准备执行推送。
      -
        name: 登录 Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 按发布标签构建并推送双架构镜像。
      - name: 构建并推送发布镜像
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/pivkeyu_emby:${{ github.event.release.tag_name }}
